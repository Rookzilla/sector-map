name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test --watch=false

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    environment: production
    permissions:
      contents: read
      id-token: write
    env:
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_STACK_NAME: ${{ vars.CDK_STACK_NAME }}
      FREE_TIER_CF_DATA_MB_LIMIT: ${{ vars.FREE_TIER_CF_DATA_MB_LIMIT }}
      FREE_TIER_CF_REQUEST_LIMIT: ${{ vars.FREE_TIER_CF_REQUEST_LIMIT }}
      FREE_TIER_GUARD_BLOCK_PERCENT: ${{ vars.FREE_TIER_GUARD_BLOCK_PERCENT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment variables
        shell: bash
        run: |
          set -euo pipefail
          : "${AWS_ACCOUNT_ID:?Set repository variable AWS_ACCOUNT_ID}"
          : "${AWS_REGION:?Set repository variable AWS_REGION}"
          : "${CDK_STACK_NAME:?Set repository variable CDK_STACK_NAME}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install root dependencies
        run: yarn install --frozen-lockfile

      - name: Install CDK dependencies
        run: yarn --cwd cdk install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/GitHubActionsCdkDeployRole
          role-session-name: sector-map-deploy

      - name: Free-tier guardrail check
        shell: bash
        run: bash scripts/ci/check-free-tier-guardrails.sh

      - name: CDK bootstrap
        env:
          CDK_DEFAULT_ACCOUNT: ${{ env.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: yarn --cwd cdk cdk bootstrap aws://${AWS_ACCOUNT_ID}/${AWS_REGION}

      - name: CDK deploy
        env:
          CDK_DEFAULT_ACCOUNT: ${{ env.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: yarn --cwd cdk cdk deploy ${CDK_STACK_NAME} --require-approval never

      - name: Resolve stack outputs
        id: outputs
        shell: bash
        run: |
          set -euo pipefail
          BUCKET_NAME="$(aws cloudformation describe-stacks \
            --stack-name "$CDK_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteBucketName'].OutputValue | [0]" \
            --output text)"
          DISTRIBUTION_ID="$(aws cloudformation describe-stacks \
            --stack-name "$CDK_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue | [0]" \
            --output text)"
          DOMAIN_NAME="$(aws cloudformation describe-stacks \
            --stack-name "$CDK_STACK_NAME" \
            --region "$AWS_REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDomainName'].OutputValue | [0]" \
            --output text)"

          echo "bucket_name=$BUCKET_NAME" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
          echo "domain_name=$DOMAIN_NAME" >> "$GITHUB_OUTPUT"

      - name: Build frontend artifact
        run: yarn build

      - name: Upload static assets to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync dist/ s3://${{ steps.outputs.outputs.bucket_name }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp dist/index.html s3://${{ steps.outputs.outputs.bucket_name }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html; charset=utf-8"

      - name: Invalidate CloudFront (minimal paths)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.outputs.outputs.distribution_id }} \
            --paths "/" "/index.html"

      - name: Deployment summary
        run: |
          echo "Deployment complete"
          echo "CloudFront URL: https://${{ steps.outputs.outputs.domain_name }}"